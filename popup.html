<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cache-Bust Auto Refresh</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 14px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .url {
        margin-bottom: 12px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(127, 127, 127, 0.12);
        overflow-wrap: anywhere;
        font-size: 12px;
        line-height: 1.35;
      }

      label {
        display: block;
        margin-top: 12px;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input[type="number"],
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        margin-top: 5px;
        padding: 7px;
        border: 1px solid rgba(127, 127, 127, 0.5);
        border-radius: 6px;
        font: inherit;
      }

      button {
        width: 100%;
        margin-top: 10px;
        padding: 8px 10px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 650;
      }

      button.primary {
        background: #0a84ff;
        color: white;
      }

      button.secondary {
        background: rgba(127, 127, 127, 0.16);
        color: inherit;
      }

      .note {
        margin-top: 12px;
        color: #666;
        font-size: 12px;
        line-height: 1.35;
      }

      .status {
        min-height: 16px;
        margin-top: 10px;
        font-size: 12px;
      }

      .error {
        color: #b00020;
      }

      .success {
        color: #16833a;
      }
    </style>
  </head>
  <body>
    <h1>Cache-Bust Auto Refresh</h1>

    <div class="url" id="url">Loading current page…</div>

    <label class="checkbox-label">
      <input type="checkbox" id="enabled" />
      <span>Enable auto-refresh for this page</span>
    </label>

    <label>
      Refresh every seconds
      <input type="number" id="seconds" min="1" step="1" value="15" />
    </label>

    <label>
      Cache-bust query param
      <input type="text" id="paramName" value="_cb" />
    </label>

    <label class="checkbox-label">
      <input type="checkbox" id="addNoCacheHeaders" checked />
      <span>Attempt no-cache request headers</span>
    </label>

    <button class="primary" id="save">Save</button>
    <button class="secondary" id="turnOff">Turn off auto-refresh</button>
    <button class="secondary" id="hardReload">Hard reload now</button>

    <div class="status" id="status"></div>

    <div class="note">
      This is best-effort. It can help with browser cache and some shared caches,
      but it cannot force a third-party CDN or origin to serve fresh content.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
